name: Daily Sergeli weather

on:
  push:
    branches:
      - main
  schedule:
    # 02:05 UTC is 07:05 in Tashkent/UTC+5. The extra 5 minutes avoids
    # GitHub's busiest start-of-hour schedule window.
    - cron: "5 2 * * *"
  workflow_dispatch:

jobs:
  send-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send Telegram weather update
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python weather_to_telegram.py
